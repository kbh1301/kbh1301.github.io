services:
  generate-pdf:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    volumes:
      - .:/work
      - pdf_node_modules:/work/node_modules
      - pdf_pnpm_store:/pnpm-store
    working_dir: /work
    environment:
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    command: sh -c "corepack enable && corepack prepare pnpm@11.1.3 --activate && pnpm install --frozen-lockfile --store-dir /pnpm-store && node build-scripts/generate-pdf.js"

volumes:
  pdf_node_modules:
  pdf_pnpm_store:
